<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Pulse Pro | Global Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { background: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 1.5rem; }
        .input-style { background: #111; border: 1px solid #333; color: white; border-radius: 0.5rem; padding: 10px; width: 100%; }
        .pulse-day { width: 15px; height: 15px; border-radius: 3px; background: #222; }
        .green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="auth-section" class="max-w-md mx-auto mt-20 glass-card p-8 text-center">
        <h2 class="text-3xl font-bold mb-6">Create Account</h2>
        <input type="text" id="username" placeholder="Full Name" class="input-style mb-4">
        <input type="email" id="useremail" placeholder="Email Address" class="input-style mb-4">
        <button onclick="handleSignUp()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold">Launch My Platform</button>
    </div>

    <div id="main-dashboard" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold text-blue-400">Welcome, <span id="display-name">Learner</span></h1>
                <p class="text-gray-400">Global Course Tracker v2.0</p>
            </div>
            <div class="text-right">
                <div id="streak-count" class="text-2xl">🔥 0 Days</div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6">
                <h3 class="text-xl font-semibold mb-4 text-blue-300">Target Course</h3>
                <input list="courses" id="course-input" placeholder="Search any course (UPSC, AI, Data...)" class="input-style mb-4">
                <datalist id="courses">
                    <option value="UPSC: Indian Polity (M. Laxmikanth)">
                    <option value="UPSC: Geography (GC Leong)">
                    <option value="Data Scientist: Python & ML">
                    <option value="Data Analyst: SQL & PowerBI">
                    <option value="Full Stack: React & Node.js">
                    <option value="Stock Market: Technical Analysis">
                    <option value="Digital Marketing: SEO & SEM">
                    <option value="Artificial Intelligence: LLMs & Neural Networks">
                </datalist>
                
                <h3 class="text-xl font-semibold mb-4 text-blue-300">Today's Topic</h3>
                <input type="text" id="topic-input" placeholder="What specifically are you studying?" class="input-style">
                <button onclick="startSession()" class="w-full mt-4 bg-green-600 py-2 rounded-lg font-bold">Start Study Session</button>
            </div>

            <div id="study-zone" class="md:col-span-2 glass-card p-6 hidden">
                <h2 class="text-2xl font-bold mb-4">Dynamic Recall: <span id="current-topic-display" class="text-yellow-400"></span></h2>
                <div id="quiz-container" class="space-y-4">
                    </div>
                <button onclick="submitDay()" class="mt-8 w-full bg-blue-600 py-4 rounded-xl font-bold text-lg">Lock Today's Knowledge</button>
            </div>
        </div>

        <div class="mt-10 glass-card p-6">
            <h3 class="mb-4 text-gray-400">Your Learning Pulse (365 Days)</h3>
            <div id="pulse-grid" class="flex flex-wrap gap-1"></div>
        </div>
    </div>

<script>
    // 1. SIGNUP LOGIC
    function handleSignUp() {
        const name = document.getElementById('username').value;
        if(!name) return alert("Please enter your name");
        localStorage.setItem('user_name', name);
        localStorage.setItem('isLoggedIn', 'true');
        showDashboard();
    }

    function showDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-dashboard').classList.remove('hidden');
        document.getElementById('display-name').innerText = localStorage.getItem('user_name');
        generateGrid();
    }

    // 2. SESSION LOGIC
    function startSession() {
        const topic = document.getElementById('topic-input').value;
        if(!topic) return alert("Enter the topic you are studying today!");
        
        document.getElementById('current-topic-display').innerText = topic;
        document.getElementById('study-zone').classList.remove('hidden');
        generateQuiz(topic);
    }

    // 3. DYNAMIC 10 QUESTIONS (Based on study topic)
    function generateQuiz(topic) {
        const container = document.getElementById('quiz-container');
        const questions = [
            `What is the fundamental definition of ${topic}?`,
            `What are the top 3 components/pillars of ${topic}?`,
            `How does ${topic} apply to real-world industries?`,
            `Explain the most complex part of ${topic} simply.`,
            `What is one thing you didn't know about ${topic} before today?`,
            `If you were an expert in ${topic}, how would you solve a problem with it?`,
            `What are the historical or theoretical roots of ${topic}?`,
            `Write down one formula, key term, or date related to ${topic}.`,
            `What is the biggest challenge in mastering ${topic}?`,
            `Summarize today's study in 10 words.`
        ];
        
        container.innerHTML = questions.map((q, i) => `
            <div class="p-4 border-b border-white/5">
                <p class="text-sm text-gray-400 mb-2">Question ${i+1}</p>
                <p class="font-medium mb-2">${q}</p>
                <textarea class="input-style text-sm h-20" placeholder="Type your answer based on your study..."></textarea>
            </div>
        `).join('');
    }

    // 4. PERSISTENCE (Grid & Streaks)
    function generateGrid() {
        const grid = document.getElementById('pulse-grid');
        for(let i=0; i<365; i++) {
            const day = document.createElement('div');
            day.className = 'pulse-day';
            day.id = 'day-' + i;
            grid.appendChild(day);
        }
        loadProgress();
    }

    function submitDay() {
        const today = new Date().getDay() + (new Date().getMonth() * 30); // Rough day index
        localStorage.setItem('day-' + today, 'done');
        alert("Knowledge Locked! Pulse turned Green.");
        loadProgress();
    }

    function loadProgress() {
        for(let i=0; i<365; i++) {
            if(localStorage.getItem('day-' + i)) {
                document.getElementById('day-' + i).classList.add('green');
            }
        }
    }

    // Check login on load
    if(localStorage.getItem('isLoggedIn')) showDashboard();
</script>
</body>
</html>
